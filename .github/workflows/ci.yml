name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # action-shellcheck builds its file list with `find -name *<path>`, but
      # `find -name` only matches basenames — so any pattern containing a slash
      # (e.g. test/sandbox.bats) is silently skipped. Invoke shellcheck
      # directly so the test files are actually checked.
      - run: shellcheck --format=gcc ralph install.sh test/*.bats test/test_helper.bash

  test:
    name: BATS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bats-core/bats-action@main
      - run: bats test/
